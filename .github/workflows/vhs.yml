name: Generate terminal GIFs (VHS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.vhs/**'
      - 'scripts/**'
      - 'experience'
      - 'focus'

jobs:
  vhs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg and ttyd
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          (sudo apt-get install -y ttyd 2>/dev/null) || true

      - name: Generate whoami.gif
        uses: charmbracelet/vhs-action@v1
        with:
          path: .vhs/whoami.tape

      - name: Generate experience.gif
        uses: charmbracelet/vhs-action@v1
        with:
          path: .vhs/experience.tape

      - name: Generate focus.gif
        uses: charmbracelet/vhs-action@v1
        with:
          path: .vhs/focus.tape

      - name: Commit GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/whoami.gif assets/experience.gif assets/focus.gif 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No GIF changes to commit"
          else
            git commit -m "chore: update VHS terminal GIFs"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
