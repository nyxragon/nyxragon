name: Update profile views badge

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/profile-views-badge.yml"

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and save profile views badge
        run: |
          curl -sL "https://visitor-badge.vercel.app/badge?page_id=nyxragon.nyxragon&left_color=312e81&right_color=6d28d9&left_text=Profile%20views" -o assets/profile-views.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile-views.svg
          git diff --staged --quiet || (git commit -m "chore: update profile views badge" && git push)
