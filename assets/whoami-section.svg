<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="100%" role="img" aria-label="Whoami nyxragon">
  <defs>
    <linearGradient id="whoamiBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="396" height="316" rx="8" ry="8" fill="none" stroke="url(#whoamiBorder)" stroke-width="1.5"/>
  <rect x="10" y="10" width="380" height="300" rx="6" ry="6" fill="#0d1117" stroke="#1e293b" stroke-width="0.5"/>
  <text x="200" y="38" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#00F5FF">WHOAMI</text>
  <text x="200" y="62" text-anchor="middle" font-family="monospace" font-size="13" fill="#a78bfa">nyxragon</text>
  <text x="200" y="82" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">security researcher</text>
  <line x1="24" y1="98" x2="376" y2="98" stroke="#334155" stroke-width="0.5"/>
  <text x="24" y="118" font-family="monospace" font-size="11" fill="#a78bfa">Intersection:</text>
  <text x="28" y="136" font-family="monospace" font-size="10" fill="#94a3b8">- AI Red Teaming, LLM security</text>
  <text x="28" y="152" font-family="monospace" font-size="10" fill="#94a3b8">- ASM, Cloud, Web, Detection</text>
  <line x1="24" y1="168" x2="376" y2="168" stroke="#334155" stroke-width="0.5"/>
  <text x="24" y="188" font-family="monospace" font-size="10" fill="#a78bfa">Pushing AI into security pipelines,</text>
  <text x="24" y="204" font-family="monospace" font-size="10" fill="#a78bfa">mapping attack surfaces, tooling.</text>
  <line x1="24" y1="218" x2="376" y2="218" stroke="#334155" stroke-width="0.5"/>
  <text x="200" y="244" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#00F5FF">Break things.</text>
  <text x="200" y="264" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#00F5FF">Understand them. Automate the defense.</text>
</svg>
