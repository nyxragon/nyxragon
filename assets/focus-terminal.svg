      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
  </defs>
  <rect width="320" height="300" rx="12" ry="12" fill="#1e293b" stroke="#00F5FF" stroke-width="2"/>
  <rect x="12" y="12" width="296" height="276" rx="6" ry="6" fill="url(#termFocusBg)"/>
  <text x="160" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">terminal</text>
  <line x1="20" y1="52" x2="308" y2="52" stroke="#334155" stroke-width="0.5"/>
  <text x="24" y="76" font-family="monospace" font-size="11" fill="#22d3ee">$ cat focus</text>
  <text x="24" y="98" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.2s" fill="freeze"/>- researching AI abuse cases</text>
  <text x="24" y="116" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.2s" fill="freeze"/>- building offensive tooling</text>
  <text x="24" y="134" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>- exploring attack surfaces</text>
  <text x="24" y="152" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze"/>- cloud security</text>
  <text x="24" y="170" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/>- automating security workflows</text>
  <rect x="40" y="184" width="8" height="12" fill="#00F5FF"><animate attributeName="opacity" values="1;0.3;1" begin="2.1s" dur="0.8s" repeatCount="indefinite"/></rect>
