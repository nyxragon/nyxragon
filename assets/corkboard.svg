<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="100%" role="img" aria-label="OSINT corkboard  case nyxragon">
  <defs>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2a3d"/>
      <stop offset="100%" style="stop-color:#1a1825"/>
    </linearGradient>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- board -->
  <rect width="700" height="220" fill="#0D1117"/>
  <rect x="24" y="16" width="652" height="188" rx="12" ry="12" fill="url(#boardGrad)" stroke="#3d3a4d" stroke-width="1"/>
  <!-- center subject card -->
  <rect x="268" y="72" width="164" height="56" rx="6" ry="6" fill="#1e1b4b" stroke="#8A2BE2" stroke-width="1.5" filter="url(#pinShadow)"/>
  <text x="350" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00F5FF">SUBJECT</text>
  <text x="350" y="116" text-anchor="middle" font-family="system-ui,monospace" font-size="13" fill="#e2e8f0">nyxragon</text>
  <!-- association cards -->
  <rect x="48" y="36" width="120" height="44" rx="4" ry="4" fill="#0d1117" stroke="#00F5FF" stroke-width="1" opacity="0.95"/>
  <text x="108" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">ASSOCIATIONS</text>
  <text x="108" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">H1 · ZERON · Sec</text>
  <rect x="532" y="36" width="120" height="44" rx="4" ry="4" fill="#0d1117" stroke="#00F5FF" stroke-width="1" opacity="0.95"/>
  <text x="592" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">EVIDENCE</text>
  <text x="592" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">CVE · PIIScout</text>
  <rect x="48" y="152" width="140" height="36" rx="4" ry="4" fill="#0d1117" stroke="#8A2BE2" stroke-width="1" opacity="0.95"/>
  <text x="118" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">CAPABILITIES</text>
  <rect x="512" y="152" width="140" height="36" rx="4" ry="4" fill="#0d1117" stroke="#8A2BE2" stroke-width="1" opacity="0.95"/>
  <text x="582" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">FOCUS</text>
  <!-- connector lines (yarn/string style) -->
  <path d="M 308 88 Q 180 60 120 58" fill="none" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.7"/>
  <path d="M 392 88 Q 520 60 580 58" fill="none" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.7"/>
  <path d="M 300 120 Q 160 160 118 168" fill="none" stroke="#8A2BE2" stroke-width="0.8" stroke-opacity="0.7"/>
  <path d="M 400 120 Q 540 160 582 168" fill="none" stroke="#8A2BE2" stroke-width="0.8" stroke-opacity="0.7"/>
  <!-- case label -->
  <text x="350" y="208" text-anchor="middle" font-family="system-ui,monospace" font-size="10" fill="#64748b">case: nyxragon · OSINT board</text>
</svg>
