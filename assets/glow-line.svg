<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 12" width="800" height="12">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7EE787;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#7EE787;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#7EE787;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>
  <rect y="4" width="800" height="4" fill="url(#glow)" filter="url(#blur)" opacity="0.8"/>
  <rect y="5" width="800" height="2" fill="url(#glow)"/>
</svg>
