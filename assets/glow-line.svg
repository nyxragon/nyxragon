<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 14" width="800" height="14">
  <defs>
    <linearGradient id="travel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="20%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    <clipPath id="clip"><rect width="800" height="14"/></clipPath>
  </defs>
  <rect width="800" height="14" fill="#0d1117"/>
  <g clip-path="url(#clip)">
    <rect width="1200" height="8" y="3" fill="url(#travel)" filter="url(#blur)" opacity="0.9">
      <animate attributeName="x" values="-400;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect width="1200" height="4" y="5" fill="url(#travel)">
      <animate attributeName="x" values="-400;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
