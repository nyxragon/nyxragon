<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Discord">
  <defs>
    <linearGradient id="dcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="100%" style="stop-color:#A970FF"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <!-- Discord logo shape: controller pill (two grips + center) -->
    <path d="M 4 24 A 10 10 0 0 1 14 14 L 34 14 A 10 10 0 0 1 44 24 A 10 10 0 0 1 34 34 L 14 34 A 10 10 0 0 1 4 24 Z" fill="#1e293b" stroke="url(#dcGrad)" stroke-width="2"/>
    <!-- Clyde face: eyes -->
    <circle cx="20" cy="22" r="2.5" fill="url(#dcGrad)"/>
    <circle cx="28" cy="22" r="2.5" fill="url(#dcGrad)"/>
    <!-- smile -->
    <path d="M 18 28 Q 24 33 30 28" fill="none" stroke="url(#dcGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
