<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 62" width="48" height="62" role="img" aria-label="LinkedIn">
  <defs>
    <linearGradient id="liGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="100%" style="stop-color:#A970FF"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="2s" repeatCount="indefinite"/>
    <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="#1e293b" stroke="url(#liGrad)" stroke-width="2"/>
    <text x="24" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#liGrad)">in</text>
  </g>
  <text x="24" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="url(#liGrad)" style="letter-spacing:0.08em">LinkedIn</text>
</svg>
