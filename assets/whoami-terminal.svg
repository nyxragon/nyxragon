  <text x="24" y="76" font-family="monospace" font-size="11" fill="#22d3ee">$ whoami</text>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.2s" fill="freeze"/><text x="24" y="98" font-family="monospace" font-size="10" fill="#a78bfa">nyxragon</text></g>
