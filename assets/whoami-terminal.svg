  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/><text x="24" y="156" font-family="monospace" font-size="9" fill="#64748b">Break things. Understand them.</text></g>
