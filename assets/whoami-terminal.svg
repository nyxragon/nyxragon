      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
  </defs>
  <rect width="320" height="340" rx="12" ry="12" fill="#1e293b" stroke="#00F5FF" stroke-width="2"/>
